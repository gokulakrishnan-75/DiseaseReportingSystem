<!DOCTYPE html>
<html>
<head>
<title>Doctor Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.heat/dist/leaflet-heat.js"></script>

<style>

/* ===== GLOBAL ===== */
body{
margin:0;
font-family:'Segoe UI';
background:#eef2f7;
}

/* LAYOUT */
.layout{
display:flex;
}

/* SIDEBAR */
.sidebar{
width:240px;
height:100vh;
background:linear-gradient(180deg,#0f172a,#1e293b);
color:white;
padding:20px;
}

.sidebar h2{
margin-bottom:30px;
}

.sidebar button{
width:100%;
margin:10px 0;
padding:12px;
background:#334155;
border:none;
color:white;
cursor:pointer;
border-radius:8px;
transition:0.3s;
}

.sidebar button:hover{
background:#3b82f6;
transform:translateX(5px);
}

/* MAIN */
.main{
flex:1;
padding:20px;
}

/* HEADER */
.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.doctor{
background:white;
padding:10px 15px;
border-radius:20px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

/* CARDS */
.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:15px;
margin-bottom:20px;
}

.card{
padding:20px;
border-radius:12px;
color:white;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
transition:0.3s;
}

.card:hover{
transform:translateY(-5px);
}

.total{background:#3b82f6;}
.danger{background:#ef4444;}
.today{background:#10b981;}

/* ALERT */
.alert{
background:#ef4444;
color:white;
padding:12px;
border-radius:8px;
margin-bottom:10px;
animation:blink 1s infinite;
}

.hidden{
display:none;
}

@keyframes blink{
0%{opacity:1;}
50%{opacity:0.5;}
100%{opacity:1;}
}

/* SEARCH */
.search{
width:100%;
padding:10px;
margin-bottom:10px;
border-radius:8px;
border:1px solid #ccc;
}

/* TABLE */
.table-container{
background:white;
padding:15px;
border-radius:10px;
box-shadow:0 5px 10px rgba(0,0,0,0.1);
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:10px;
text-align:left;
border-bottom:1px solid #ddd;
}

tr:hover{
background:#f1f5f9;
}

/* BUTTON */
.deleteBtn{
background:#ef4444;
color:white;
border:none;
padding:6px 10px;
border-radius:5px;
cursor:pointer;
}

.deleteBtn:hover{
background:#dc2626;
}

/* CHART */
.chart-box{
margin-top:20px;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 5px 10px rgba(0,0,0,0.1);
}

</style>
</head>

<body>

<div class="layout">

<!-- SIDEBAR -->
<div class="sidebar">
    <h2>🧑‍⚕️ Health Panel</h2>

    <button onclick="loadReports()">📋 Patient Reports</button>
    <button onclick="loadAnalytics()">📊 Analytics</button>
    <button onclick="openMap()">🌍 Map</button>
    <button onclick="downloadReports()">📥 Export</button>
</div>

<!-- MAIN -->
<div class="main">

<!-- HEADER -->
<div class="header">
    <h1>Doctor Dashboard</h1>
    <div class="doctor">👨‍⚕️ Dr. Admin</div>
</div>

<!-- CARDS -->
<div class="cards">
    <div class="card total">
        <h3 id="totalReports">0</h3>
        <p>Total Cases</p>
    </div>

    <div class="card danger">
        <h3 id="topDisease">-</h3>
        <p>Most Common Disease</p>
    </div>

    <div class="card today">
        <h3 id="todayReports">0</h3>
        <p>Today's Cases</p>
    </div>
</div>

<!-- ALERT -->
<div id="alertBox" class="alert hidden">
⚠️ High number of cases detected!
</div>

<!-- SEARCH -->
<input type="text" class="search" placeholder="Search patient..." onkeyup="filterReports()">

<!-- TABLE -->
<div class="table-container">
<table>
<thead>
<tr>
<th>Select</th>
<th>Name</th>
<th>Age</th>
<th>Phone</th>
<th>Disease</th>
<th>Location</th>
<th>Date</th>
<th>Action</th>
</tr>
</thead>

<tbody id="reports"></tbody>
</table>
</div>

<!-- CHART -->
<div class="chart-box">
<h3>Disease Distribution</h3>
<canvas id="chart"></canvas>
</div>

</div>
</div>

<script src="script.js"></script>

<script>

// LOAD REPORTS
async function loadReports(){

let res = await fetch("/reports")
let data = await res.json()

let table = document.getElementById("reports")
table.innerHTML=""

let diseaseCount={}
let today=new Date().toLocaleDateString()
let todayCount=0

data.forEach(r=>{

table.innerHTML+=`
<tr>
<td><input type="checkbox" class="selectReport" value="${r._id}"></td>
<td>${r.name}</td>
<td>${r.age}</td>
<td>${r.phone}</td>
<td>${r.disease}</td>
<td>${r.location}</td>
<td>${r.date}</td>
<td><button class="deleteBtn" onclick="deleteReport('${r._id}')">Delete</button></td>
</tr>
`

diseaseCount[r.disease]=(diseaseCount[r.disease]||0)+1

if(new Date(r.date).toLocaleDateString()===today){
todayCount++
}

})

// stats
document.getElementById("totalReports").innerText=data.length
document.getElementById("todayReports").innerText=todayCount

let top=Object.keys(diseaseCount).reduce((a,b)=>diseaseCount[a]>diseaseCount[b]?a:b,"-")
document.getElementById("topDisease").innerText=top

// alert
if(data.length>10){
document.getElementById("alertBox").classList.remove("hidden")
}

}

// SEARCH
function filterReports(){
let k=document.querySelector(".search").value.toLowerCase()
document.querySelectorAll("#reports tr").forEach(row=>{
row.style.display=row.innerText.toLowerCase().includes(k)?"":"none"
})
}

// MAP
function openMap(){
window.location="/admin-map.html"
}

</script>

</body>
</html>
