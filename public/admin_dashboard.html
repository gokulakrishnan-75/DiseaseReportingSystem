<!DOCTYPE html>
<html>
<head>
<title>Doctor Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.heat/dist/leaflet-heat.js"></script>

<style>

/* ===== GLOBAL ===== */
body{
margin:0;
font-family:'Segoe UI';
background:#eef2f7;
}

.layout{
display:flex;
}

/* SIDEBAR */
.sidebar{
width:240px;
height:100vh;
background:#0f172a;
color:white;
padding:20px;
}

.sidebar button{
width:100%;
margin:10px 0;
padding:12px;
background:#1e293b;
border:none;
color:white;
cursor:pointer;
border-radius:8px;
transition:0.3s;
}

.sidebar button:hover{
background:#3b82f6;
}

/* MAIN */
.main{
flex:1;
padding:20px;
}

/* HEADER */
.header{
display:flex;
justify-content:space-between;
}

/* CARDS */
.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:15px;
margin:20px 0;
}

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 5px 10px rgba(0,0,0,0.1);
}

/* PANELS */
.panel{
display:none;
}

.active{
display:block;
}

/* TABLE */
table{
width:100%;
border-collapse:collapse;
background:white;
}

th,td{
padding:10px;
border-bottom:1px solid #ddd;
}

/* MAP */
#map{
height:400px;
border-radius:10px;
}

/* SEARCH */
.search{
padding:10px;
width:100%;
margin-bottom:10px;
}

</style>
</head>

<body>

<div class="layout">

<!-- SIDEBAR -->
<div class="sidebar">
<h2>🧑‍⚕️ Panel</h2>

<button onclick="showPanel('home')">🏠 Dashboard</button>
<button onclick="showPanel('reports'); loadReports()">📋 Reports</button>
<button onclick="showPanel('analytics'); loadAnalytics()">📊 Analytics</button>
<button onclick="showPanel('map'); loadHeatmap()">🌍 Map</button>

</div>

<!-- MAIN -->
<div class="main">

<div class="header">
<h1>Doctor Dashboard</h1>
<div>👨‍⚕️ Admin</div>
</div>

<!-- HOME PANEL -->
<div id="home" class="panel active">

<div class="cards">
<div class="card">
<h3 id="totalReports">0</h3>
<p>Total Cases</p>
</div>

<div class="card">
<h3 id="topDisease">-</h3>
<p>Top Disease</p>
</div>

<div class="card">
<h3 id="todayReports">0</h3>
<p>Today's Cases</p>
</div>
</div>

<div class="card">
<h3>📌 System Overview</h3>
<p>This dashboard helps doctors monitor disease outbreaks, analyze trends, and track patient reports in real-time.</p>
</div>

</div>

<!-- REPORT PANEL -->
<div id="reports" class="panel">

<input type="text" class="search" placeholder="Search..." onkeyup="filterReports()">

<table>
<thead>
<tr>
<th>Name</th>
<th>Age</th>
<th>Disease</th>
<th>Location</th>
<th>Date</th>
</tr>
</thead>
<tbody id="reportTable"></tbody>
</table>

</div>

<!-- ANALYTICS PANEL -->
<div id="analytics" class="panel">
<h3>Disease Analytics</h3>
<canvas id="chart"></canvas>
</div>

<!-- MAP PANEL -->
<div id="mapPanel" class="panel">
<h3>Disease Heatmap</h3>
<div id="map"></div>
</div>

</div>
</div>

<script src="script.js"></script>

<script>

// PANEL SWITCH
function showPanel(panelId){

document.querySelectorAll(".panel").forEach(p=>{
p.classList.remove("active")
})

if(panelId === "map"){
document.getElementById("mapPanel").classList.add("active")
}else{
document.getElementById(panelId).classList.add("active")
}

}

// LOAD REPORTS
async function loadReports(){

let res = await fetch("/reports")
let data = await res.json()

let table = document.getElementById("reportTable")
table.innerHTML=""

let diseaseCount={}
let today=new Date().toLocaleDateString()
let todayCount=0

data.forEach(r=>{

table.innerHTML+=`
<tr>
<td>${r.name}</td>
<td>${r.age}</td>
<td>${r.disease}</td>
<td>${r.location}</td>
<td>${r.date}</td>
</tr>
`

diseaseCount[r.disease]=(diseaseCount[r.disease]||0)+1

if(new Date(r.date).toLocaleDateString()===today){
todayCount++
}

})

// stats
document.getElementById("totalReports").innerText=data.length
document.getElementById("todayReports").innerText=todayCount

let top=Object.keys(diseaseCount).reduce((a,b)=>diseaseCount[a]>diseaseCount[b]?a:b,"-")
document.getElementById("topDisease").innerText=top

}

// SEARCH
function filterReports(){
let k=document.querySelector(".search").value.toLowerCase()
document.querySelectorAll("#reportTable tr").forEach(row=>{
row.style.display=row.innerText.toLowerCase().includes(k)?"":"none"
})
}

// ANALYTICS
async function loadAnalytics(){

let res = await fetch("/analytics")
let data = await res.json()

let labels=data.map(d=>d._id)
let values=data.map(d=>d.count)

new Chart(document.getElementById("chart"),{
type:"bar",
data:{
labels:labels,
datasets:[{
label:"Cases",
data:values
}]
}
})

}

// HEATMAP
async function loadHeatmap(){

let res = await fetch("/reports")
let reports = await res.json()

let map = L.map('map').setView([20.5937,78.9629],5)

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map)

let heatPoints=[]

reports.forEach(r=>{
if(r.lat && r.lng){
heatPoints.push([r.lat,r.lng,0.5])
}
})

L.heatLayer(heatPoints).addTo(map)

}

</script>

</body>
</html>
