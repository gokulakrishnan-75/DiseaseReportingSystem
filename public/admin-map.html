<body>

<div class="header">
<h1>🌍 Disease Monitoring Map</h1>
</div>

<div class="controls">
<label>Filter Disease:</label>
<select id="diseaseFilter">
<option value="all">All Diseases</option>
</select>
</div>

<div id="map"></div>

</body>

<script>

const map = L.map('map').setView([20.5937,78.9629],5)

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
maxZoom:18
}).addTo(map)

let markers=[]
let reports=[]

fetch("/reports")
.then(res=>res.json())
.then(data=>{

reports=data

const filter=document.getElementById("diseaseFilter")

let diseases=new Set()

data.forEach(r=>{

diseases.add(r.disease)

})

/* create dropdown options */

diseases.forEach(d=>{

let option=document.createElement("option")
option.value=d
option.textContent=d
filter.appendChild(option)

})

showMarkers("all")

})

function showMarkers(disease){

markers.forEach(m=>map.removeLayer(m))
markers=[]

reports.forEach(r=>{

if(disease==="all" || r.disease===disease){

if(r.lat && r.lng){

let marker=L.marker([r.lat,r.lng]).addTo(map)

marker.bindPopup(
`<b>Disease:</b> ${r.disease}<br>
<b>Name:</b> ${r.name}<br>
<b>Location:</b> ${r.location}`
)

markers.push(marker)

}

}

})

}

document.getElementById("diseaseFilter").addEventListener("change",function(){

showMarkers(this.value)

})

</script>
