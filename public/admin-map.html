<!DOCTYPE html>
<html>
<head>

<title>Disease Map</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>

#map{
height:90vh;
width:100%;
}

</style>

</head>

<body>

<h2 style="text-align:center">Disease Map</h2>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

const map = L.map('map').setView([20.5937,78.9629],5)

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
maxZoom:19
}).addTo(map)

fetch("/reports")
.then(res=>res.json())
.then(data=>{

data.forEach(r=>{

if(r.lat && r.lng){

let marker = L.marker([r.lat,r.lng]).addTo(map)

marker.bindPopup(
"<b>Disease:</b> "+r.disease+
"<br><b>Name:</b> "+r.name+
"<br><b>Location:</b> "+r.location
)

}

})

})

</script>

</body>
</html>
