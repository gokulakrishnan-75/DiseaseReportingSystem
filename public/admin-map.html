<!DOCTYPE html>
<html>
<head>

<title>Disease Map</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>

body{
margin:0;
font-family:Arial;
background:#f5f5f5;
}

h2{
text-align:center;
padding:15px;
background:#2c3e50;
color:white;
}

#map{
height:90vh;
width:100%;
}

</style>

</head>

<body>

<h2>🌍 Disease Report Map</h2>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

// initialize map

const map = L.map('map').setView([20.5937,78.9629],5)

// map tiles

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
maxZoom:18
}).addTo(map)

// get reports

fetch("/reports")
.then(res => res.json())
.then(data => {

console.log(data)

data.forEach(report => {

if(report.lat && report.lng){

let marker = L.marker([report.lat,report.lng]).addTo(map)

marker.bindPopup(
`<b>Disease:</b> ${report.disease}<br>
<b>Name:</b> ${report.name}<br>
<b>Location:</b> ${report.location}<br>
<b>Date:</b> ${report.date}`
)

}

})

})

</script>

</body>
</html>
