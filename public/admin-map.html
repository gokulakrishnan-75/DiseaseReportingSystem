<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Disease Monitoring Admin Map</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

</head>

<body>

<div class="header">
🌍 Disease Monitoring Admin Map
</div>

<!-- STATISTICS -->

<div class="stats">

<div class="card">
<h3>Total Reports</h3>
<p id="totalReports">0</p>
</div>

<div class="card">
<h3>Total Diseases</h3>
<p id="totalDiseases">0</p>
</div>

<div class="card">
<h3>Locations</h3>
<p id="totalLocations">0</p>
</div>

</div>

<!-- CONTROLS -->

<div class="map-controls">

<select id="diseaseFilter">
<option value="all">All Diseases</option>
</select>

<input type="text" id="searchLocation" placeholder="Search location">

<button onclick="loadReports()">Refresh</button>

</div>

<!-- MAP -->

<div id="map"></div>

<script>

/* MAP START */

const map = L.map('map').setView([20.5937,78.9629],5);

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{
maxZoom:19
}).addTo(map);

let allReports=[];
let markers=[];

/* COLOR */

function getColor(disease){

const colors=["red","blue","green","orange","purple","brown"];

return colors[disease.length % colors.length];

}

/* CLEAR MARKERS */

function clearMarkers(){

markers.forEach(m=>map.removeLayer(m));
markers=[];

}

/* DISPLAY REPORTS */

function displayReports(reports){

clearMarkers();

reports.forEach(r=>{

if(!r.lat || !r.lng) return;

const color=getColor(r.disease);

const marker=L.circleMarker(
[r.lat,r.lng],
{
radius:8,
color:color,
fillColor:color,
fillOpacity:0.8
}
).addTo(map);

marker.bindPopup(
`<b>Disease:</b> ${r.disease}<br>
<b>Location:</b> ${r.location}<br>
<b>Phone:</b> ${r.phone}`
);

markers.push(marker);

});

}

/* UPDATE STATS */

function updateStats(reports){

document.getElementById("totalReports").textContent=reports.length;

const diseases=new Set();
const locations=new Set();

reports.forEach(r=>{
diseases.add(r.disease);
locations.add(r.location);
});

document.getElementById("totalDiseases").textContent=diseases.size;
document.getElementById("totalLocations").textContent=locations.size;

}

/* POPULATE FILTER */

function populateFilter(reports){

const select = document.getElementById("diseaseFilter");

/* CLEAR OLD OPTIONS */

select.innerHTML = '<option value="all">All Diseases</option>';

/* GET UNIQUE DISEASES */

const diseases = new Set();

reports.forEach(report => {

if(report.disease){
diseases.add(report.disease);
}

});

/* ADD OPTIONS */

diseases.forEach(disease => {

const option = document.createElement("option");

option.value = disease;
option.textContent = disease;

select.appendChild(option);

});

}

/* LOAD REPORTS */

async function loadReports(){

try{

const res=await fetch('/reports');
const data=await res.json();

allReports=data;

displayReports(data);

populateFilter(data);

updateStats(data);

}catch(err){

console.log("Error loading reports",err);

}

}

loadReports();

/* FILTER */

document.getElementById("diseaseFilter")
.addEventListener("change",()=>{

const val=document.getElementById("diseaseFilter").value;

if(val==="all"){
displayReports(allReports);
}else{

const filtered=allReports.filter(r=>r.disease===val);

displayReports(filtered);

}

});

/* SEARCH */

document.getElementById("searchLocation")
.addEventListener("keyup",function(){

const val=this.value.toLowerCase();

const filtered=allReports.filter(r=>
r.location.toLowerCase().includes(val)
);

displayReports(filtered);

});

/* AUTO REFRESH */

setInterval(loadReports,10000);

</script>

</body>
</html>
