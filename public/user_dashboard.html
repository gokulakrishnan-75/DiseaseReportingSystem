<!DOCTYPE html>
<html>
<head>
<title>User Dashboard</title>
<link rel="stylesheet" href="style.css">
</head>

<body>
<nav class="navbar">

<h2>Disease Monitor</h2>

<div>

<a href="index.html">Home</a>
<a href="report.html">Report</a>
<a href="admin.html">Admin</a>
<a href="admin-map.html">Map</a>
<a href="analytics.html">Analytics</a>

</div>

</nav>
<h2>Your Submitted Reports</h2>

<table border="1">
<thead>
<tr>
<th>Disease</th>
<th>Location</th>
<th>Date</th>
</tr>
</thead>

<tbody id="table"></tbody>

</table>

<script>

const phone = localStorage.getItem("phone")

fetch("/userReports/"+phone)
.then(res=>res.json())
.then(data=>{

let rows=""

data.forEach(r=>{
rows += `
<tr>
<td>${r.disease}</td>
<td>${r.location}</td>
<td>${r.date}</td>
</tr>
`
})

document.getElementById("table").innerHTML = rows

})

</script>

</body>
</html>
